name: Export PDF
on:
  workflow_dispatch:
jobs:
  build_latex:
    runs-on: ubuntu-22.04
    steps:
      - name: Set up Git repository
        uses: actions/checkout@master

      - name: Pull containers in parallel
        run: |
          podman pull docker.io/texlive/texlive@sha256:45cdde7e87aff38479fae2ed740f1a5959d850f1ecc3fea29d4e934a44489a10 &
          podman pull docker.io/minidocks/ghostscript@sha256:ff0742e03ab544c8a2c8ab3e3ce72d4039463a47076ae4845955de8044b26576 &
          wait

      - name: Convert LaTeX to PDF
        run: |
          podman run --rm -v "`pwd`:/pdf:Z" -w /pdf \
            docker.io/texlive/texlive@sha256:45cdde7e87aff38479fae2ed740f1a5959d850f1ecc3fea29d4e934a44489a10 \
            latexmk -pdf \
              -shell-escape \
              -interaction=nonstopmode \
              -file-line-error \
              -pdflatex="pdflatex -synctex=1 -interaction=nonstopmode -file-line-error" \
              main.tex

      - name: Optimize PDF output
        run: |
          podman run --rm -v "`pwd`:/pdf:Z" -w /pdf \
            docker.io/minidocks/ghostscript@sha256:ff0742e03ab544c8a2c8ab3e3ce72d4039463a47076ae4845955de8044b26576 \
            gs -sDEVICE=pdfwrite \
              -dCompatibilityLevel=1.7 \
              -dPDFSETTINGS=/prepress \
              -dNOPAUSE \
              -dQUIET \
              -dBATCH \
              -sOutputFile=resume.pdf \
              main.pdf

      - name: Uploading artifact
        uses: actions/upload-artifact@master
        with:
          name: PDF
          path: resume.pdf

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@master
        with:
          name: Resume
          tag_name: v0.0.1
          token: ${{ secrets.CUSTOM_TOKEN }}

      - name: Upload Release Asset
        id: upload-release-asset
        uses: actions/upload-release-asset@master
        env:
          GITHUB_TOKEN: ${{ secrets.CUSTOM_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./resume.pdf
          asset_name: resume.pdf
          asset_content_type: application/pdf