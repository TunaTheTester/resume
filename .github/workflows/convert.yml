name: Latex to HTML
on:
  push:
    branches:
      - 'main'
jobs:
  build_latex:
    runs-on: ubuntu-20.04
    steps:
      - name: Set up Git repository
        uses: actions/checkout@master

      - name: Pull containers in parallel
        run: |
          docker pull texlive/texlive:latest &
          docker pull minidocks/ghostscript:latest &
          docker pull pdf2htmlex/pdf2htmlex:0.18.8.rc2-master-20200820-ubuntu-20.04-x86_64
          docker pull minidocks/imagemagick:latest &
          wait

      - name: Convert LaTeX to PDF
        run: |
          docker run --rm -v "`pwd`":/pdf -w /pdf texlive/texlive:latest \
            latexmk -pdf \
              -shell-escape \
              -interaction=nonstopmode \
              -file-line-error \
              -pdflatex="pdflatex -synctex=1 -interaction=nonstopmode -file-line-error" \
              main.tex

      - name: Optimize PDF output
        run: |
          docker run --rm -v "`pwd`":/pdf -w /pdf minidocks/ghostscript:latest \
            gs -sDEVICE=pdfwrite \
              -dCompatibilityLevel=1.7 \
              -dPDFSETTINGS=/prepress \
              -dNOPAUSE \
              -dQUIET \
              -dBATCH \
              -sOutputFile=resume.pdf \
              main.pdf

      - name: Convert PDF into PNG
        run: |
          docker run --rm -v "`pwd`":/pdf -w /pdf minidocks/imagemagick:latest \
            magick convert -verbose -density 150 -trim resume.pdf -quality 100 -flatten -sharpen 0x1.0 resume.png

      - name: Convert PDF into HTML
        run: |
          docker run --rm -v "`pwd`":/pdf -w /pdf \
            pdf2htmlex/pdf2htmlex:0.18.8.rc2-master-20200820-ubuntu-20.04-x86_64 --zoom 1.3 resume.pdf

      - name: Commit generated PDF file
        id: commit
        run: |
          if [ -n "$(git status --porcelain resume.pdf resume.html resume.png)" ]; then
            git config --local user.email "action[bot]@github.com"
            git config --local user.name "github-actions[bot]"
            git add resume.pdf
            git add resume.html
            git add resume.png
            git commit -m "[ci] compile resume"
            git push -u origin main
          else
            echo "No changes to commit."
          fi