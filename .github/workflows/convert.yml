name: Latex to HTML
on:
  push:
    branches:
      - 'main'
jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@master

      - name: Convert LaTeX to PDF
        run: |
          docker run --rm \
            -v "`pwd`":/pdf \
            -w /pdf \
            texlive/texlive:latest \
            latexmk -pdf \
              -shell-escape \
              -interaction=nonstopmode \
              -file-line-error \
              -pdflatex="pdflatex -synctex=1 -interaction=nonstopmode -file-line-error" \
              main.tex

      - name: Optimize PDF output
        run: |
          docker run --rm \
            -v "`pwd`":/pdf \
            -w /pdf \
            minidocks/ghostscript:latest \
            gs -sDEVICE=pdfwrite \
              -dCompatibilityLevel=1.7 \
              -dPDFSETTINGS=/prepress \
              -dNOPAUSE \
              -dQUIET \
              -dBATCH \
              -sOutputFile=resume.pdf \
              main.pdf

      - name: Convert PDF to PNG
        run: |
          docker run --rm \
            -v "`pwd`":/pdf \
            -w /pdf \
            minidocks/imagemagick:latest \
            magick resume.pdf \
              -density 450 \
              -background white \
              -alpha remove \
              -trim \
              +repage \
              -deskew 40% \
              -normalize \
              -brightness-contrast 0x10 \
              -unsharp 0x0.5+0.5+0.05 \
              -black-threshold 15% \
              -white-threshold 95% \
              -resample 400 \
              -resize 2500x \
              -quality 100 \
              resume.png

      - name: Commit generated PDF file
        id: commit
        run: |
          if [ -n "$(git status --porcelain resume.png resume.pdf)" ]; then
            git config --local user.email "action[bot]@github.com"
            git config --local user.name "github-actions[bot]"
            git add resume.png
            git add resume.pdf
            git commit -m "[ci] compile resume"
            git push -u origin main
          else
            echo "No changes to commit."
          fi